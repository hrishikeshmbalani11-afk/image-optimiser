<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>Image Optimizer</h1>
      <p class="subtext">Upload JPEG, PNG, or WebP (max 25MB).</p>

      <section id="dropzone" class="dropzone" aria-label="Upload area">
        <input id="file-input" type="file" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" hidden />
        <p><strong>Drag and drop</strong> an image here, or click to browse.</p>
      </section>

      <p id="status" class="status" role="status"></p>
      <section class="controls">
        <label class="control">
          <span>Preset</span>
          <select id="preset">
            <option value="speed">speed</option>
            <option value="balanced" selected>balanced</option>
            <option value="max_quality">max_quality</option>
            <option value="custom_quality">custom_quality</option>
          </select>
        </label>

        <label id="quality-control" class="control" hidden>
          <span>Quality (JPEG/WebP): <strong id="quality-value">85</strong></span>
          <input id="quality" type="range" min="1" max="95" step="1" value="85" />
        </label>

        <label class="control">
          <span>Resize percent: <strong id="resize-value">100%</strong></span>
          <input id="resize-percent" type="range" min="10" max="200" step="1" value="100" />
        </label>

        <label class="control">
          <span>Output format</span>
          <select id="output-format">
            <option value="JPEG">JPEG</option>
            <option value="PNG">PNG</option>
            <option value="WEBP">WebP</option>
          </select>
        </label>

        <label class="control">
          <span>Blur <-> Sharpen: <strong id="sharpness-balance-value">0.0</strong></span>
          <input id="sharpness-balance" type="range" min="-5" max="5" step="0.1" value="0.0" />
        </label>

        <label class="control">
          <span>Contrast: <strong id="contrast-value">1.0</strong></span>
          <input id="contrast" type="range" min="0.5" max="2" step="0.1" value="1.0" />
        </label>

        <label class="control">
          <span>Brightness: <strong id="brightness-value">1.0</strong></span>
          <input id="brightness" type="range" min="0.5" max="2" step="0.1" value="1.0" />
        </label>

        <label class="check">
          <input id="strip-metadata" type="checkbox" checked />
          <span>Strip metadata (default)</span>
        </label>

        <label class="check">
          <input id="auto-orient" type="checkbox" checked />
          <span>Auto-orient using EXIF</span>
        </label>
      </section>

      <p id="params-preview" class="params-preview">
        Preset options include custom_quality, which enables direct quality slider control.
      </p>

      <div class="actions">
        <button id="optimize-btn" type="button" disabled>Optimize Image</button>
      </div>

      <section class="panes">
        <article class="pane">
          <h2>Before</h2>
          <img id="before-image" alt="Uploaded image preview" />
          <p id="before-placeholder" class="placeholder">No image uploaded yet.</p>
        </article>
        <article class="pane">
          <h2>After</h2>
          <img id="after-image" alt="Optimized image preview" />
          <div id="after-placeholder" class="placeholder-box">Optimization result will appear here.</div>
          <a id="download-link" class="download-link" href="#" download hidden>Download optimized image</a>
          <p id="result-meta" class="meta"></p>
        </article>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/upload.js') }}"></script>
  </body>
  </html>
